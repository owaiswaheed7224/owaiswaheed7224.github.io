<!-- Replace your current form-actions section with this -->
<div class="form-actions">
  <button type="button" class="btn btn-secondary" id="toggleBooking">🆕 New Booking</button>
</div>

<script>
const countries = [...]; // same list as before

$(document).ready(function () {
  // Populate countries
  $(".country-select").each(function () {
    const $sel = $(this);
    countries.forEach(c => { $sel.append(new Option(c, c)); });
  });

  $(".country-select").select2({ placeholder: "Select country", allowClear: true, width: '100%' });
  $(".service-select").select2({ placeholder: "Select or type service", tags: true, tokenSeparators: [','], width: '100%' });

  // Start in PREVIEW mode
  setFormMode("preview");

  // Toggle button click
  $("#toggleBooking").on("click", function () {
    if ($(this).data("mode") === "preview") {
      setFormMode("edit");
    } else {
      $("#bookingForm").submit();
    }
  });

  // Form submission
  $("#bookingForm").submit(function (e) {
    e.preventDefault();
    var $form = $(this);
    $.ajax({
      url: $form.attr("action"),
      method: "POST",
      data: $form.serialize(),
      success: function () {
        alert("✅ Booking Submitted Successfully!");
        setFormMode("preview"); // Back to preview
      },
      error: function () {
        alert("❌ Submission failed. Try again.");
      }
    });
  });
});

// --- Helper function ---
function setFormMode(mode) {
  const $form = $("#bookingForm");
  const $fields = $form.find("input, select, textarea");
  const $selects = $form.find(".country-select, .service-select");
  const $toggleBtn = $("#toggleBooking");

  if (mode === "preview") {
    $fields.prop("readonly", true).prop("disabled", true);
    $selects.prop("disabled", true).trigger("change.select2");
    $(".deleteRow, #addRow").hide();
    $toggleBtn.text("🆕 New Booking").data("mode", "preview").removeClass("btn-primary").addClass("btn-secondary");
  } else {
    $fields.prop("readonly", false).prop("disabled", false);
    $selects.prop("disabled", false).trigger("change.select2");
    $(".deleteRow, #addRow").show();
    $toggleBtn.text("📦 Submit Booking").data("mode", "edit").removeClass("btn-secondary").addClass("btn-primary");
  }
}

// Commercial Invoice Calculations (unchanged)
function calculateRow(row) {
  let qty = parseFloat(row.find(".qty").val()) || 0;
  let rate = parseFloat(row.find(".rate").val()) || 0;
  row.find(".value").val((qty * rate).toFixed(2));
  calculateTotals();
}

function calculateTotals() {
  let totalQty = 0, totalValue = 0;
  $("#invoiceTable tbody tr").each(function () {
    let qty = parseFloat($(this).find(".qty").val()) || 0;
    let val = parseFloat($(this).find(".value").val()) || 0;
    totalQty += qty;
    totalValue += val;
  });
  $("#totalQty").val(totalQty);
  $("#totalValue").val(totalValue.toFixed(2));
}

$(document).on("input", ".qty, .rate", function () {
  calculateRow($(this).closest("tr"));
});

$(document).on("click", "#addRow", function () {
  let newRow = `<tr>
    <td><textarea class="form-control desc" name="description[]"></textarea></td>
    <td><input type="number" class="form-control qty" name="qty[]" value="0"></td>
    <td><input type="text" class="form-control unit" name="unit[]" placeholder="pcs"></td>
    <td><input type="number" step="0.01" class="form-control rate" name="rate[]" value="0"></td>
    <td><input type="number" step="0.01" class="form-control value" name="value[]" readonly></td>
    <td><button type="button" class="btn btn-danger btn-sm deleteRow">🗑</button></td>
  </tr>`;
  $("#invoiceTable tbody").append(newRow);
});

$(document).on("click", ".deleteRow", function () {
  $(this).closest("tr").remove();
  calculateTotals();
});
</script>
